# Test profile overrides layered on top of the main application.properties.
# Uses a shared in-memory SQLite database so the full application context
# (including JPA repositories) loads without external infrastructure.
spring.datasource.url=jdbc:sqlite:file::memory:?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
