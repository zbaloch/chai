# spring.mvc.view.prefix=/webapp/WEB-INF/views/
# spring.mvc.view.suffix=.jsp

server.port=${chai_spring_port:8080}
spring.datasource.url=${chai_spring_datasource_url:jdbc:sqlite:./chai.db}
spring.datasource.username=${chai_spring_datasource_username:}
spring.datasource.password=${chai_spring_datasource_password:}
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=${chai_spring_datasource_driver_class_name:org.sqlite.JDBC}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Hibernate 6 auto-detects the dialect from the JDBC connection. The SQLite dialect
# is provided by the hibernate-community-dialects dependency. To force it explicitly:
# spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

spring.thymeleaf.cache=false

# Fix DevTools classloader conflict with Spring Security
# Exclude templates from triggering restart (they reload via thymeleaf.cache=false)
spring.devtools.restart.additional-exclude=templates/**,static/**

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# logging.level.org.springframework.web.servlet=DEBUG

# Email settings
passwordless.email.from=${chai_spring_email_from:noreply@chaihq.com}
spring.mail.host=${chai_spring_mail_host:localhost}
spring.mail.port=${chai_spring_mail_port:1025}
spring.mail.username=${chai_spring_mail_username:}
spring.mail.password=${chai_spring_mail_password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${chai_spring_mail_host:localhost}
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

host.url=${chai_spring_host_url:http://localhost:8080}

# Keep users signed in across app restarts until logout or token expiry.
security.remember-me.key=${chai_security_remember_me_key:change-this-remember-me-key}
security.remember-me.token-validity-seconds=${chai_security_remember_me_token_validity_seconds:2592000}