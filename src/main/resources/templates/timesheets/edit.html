<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>

<body class="font-sans bg-[#FAF8F4]">
<div id="app">

    <nav th:replace="~{fragments/nav :: nav}"></nav>

    <div class=" min-h-screen">
        <div class="py-4">
            <div class="max-w-4xl mx-auto px-4 sm:px-4 lg:px-4">

                <div class="bg-white rounded-lg shadow p-6">
                    <div>
                        <h2 class="text-xl font-bold text-gray-900 sm:text-md  sm:truncate">
                            Update timesheet entry
                        </h2>
                    </div>



                    <form th:object="${timesheet}" th:action="@{/timesheet/{id}/edit(id=${timesheet.id})}" method="post">

                        <div class="mt-4 grid grid-cols-1 row-gap-6 col-gap-4 sm:grid-cols-6">
                            <div class="sm:col-span-3">
                                <label class="block text-sm font-medium leading-5 text-gray-700">
                                    Task
                                </label>
                                <div class="mt-1 rounded-md shadow-sm">
                                    <input th:field="*{task}" class="form-input block w-full transition duration-150 ease-in-out sm:text-sm sm:leading-5 " />
                                </div>
                                <p class="mt-1 text-sm mb-4 text-red-500" th:if="${#fields.hasErrors('task')}" th:errors="*{task}">
                                </p>
                            </div>

                            <div class="sm:col-span-3">
                                <label for="timeLogDate" class="block text-sm font-medium leading-5 text-gray-700">
                                    Date
                                </label>
                                <div class="mt-1 rounded-md">

                                    <input type="date" id="timeLogDate" name="timeLogDate"
                                           th:value="${timesheet.timeLogDate != null ? #dates.format(timesheet.timeLogDate, 'yyyy-MM-dd') : ''}"
                                           class=" form-input block w-full pl-3 py-2 text-base leading-6 border-gray-300 focus:outline-none focus:shadow-outline-blue focus:border-blue-300 sm:text-sm sm:leading-5">

                                    <p class="mt-1 text-sm mb-4 text-red-500" th:if="${#fields.hasErrors('timeLogDate')}" th:errors="*{timeLogDate}">
                                    </p>

                                </div>

                            </div>




                            <div class="sm:col-span-3">
                                <label for="projectId" class="block text-sm font-medium leading-5 text-gray-700">
                                    Project
                                </label>
                                <div class="mt-1 rounded-md shadow-sm">
                                    <select id="projectId" name="projectId" class="mt-1 form-select block w-full pl-3 pr-10 py-2 text-base leading-6 border-gray-300 focus:outline-none focus:shadow-outline-blue focus:border-blue-300 sm:text-sm sm:leading-5">
                                        <option th:each="project : ${projects}" th:value="${project.id}" th:text="${project.name}"
                                                th:selected="${timesheet.project != null and project.id == timesheet.project.id}"></option>
                                    </select>
                                </div>
                            </div>


                            <div class="sm:col-span-3">
                                <label for="manHours" class="block text-sm font-medium leading-5 text-gray-700">
                                    Time spent in hour(s)
                                </label>
                                <div class="mt-1 rounded-md shadow-sm">
                                    <input th:field="*{manHours}" class="form-input block w-full transition duration-150 ease-in-out sm:text-sm sm:leading-5 "/>
                                </div>
                                <p class="mt-1 text-sm mb-4 text-red-500" th:if="${#fields.hasErrors('manHours')}" th:errors="*{manHours}">
                                </p>
                            </div>


                            <div class="sm:col-span-6">
                                <label class="block text-sm font-medium leading-5 text-gray-700">
                                    Notes (supports markdown)
                                </label>
                                <div class="mt-1 rounded-md shadow-sm">
                                    <textarea th:field="*{notes}" class="form-input block w-full transition duration-150 ease-in-out sm:text-sm sm:leading-5 "></textarea>
                                </div>
                                <p class="mt-1 text-sm mb-4 text-red-500" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}">
                                </p>
                            </div>




                        </div>


                        <div class="mt-8 border-t border-gray-200 pt-5">
                            <div class="flex justify-end">
        <span class="inline-flex rounded-md shadow-sm">
            <a th:href="@{/projects}" class="py-2 px-4 border border-gray-300 rounded-md text-sm leading-5 font-medium text-gray-700 hover:text-gray-500 focus:outline-none focus:border-blue-300 focus:shadow-outline-blue active:bg-gray-50 active:text-gray-800 transition duration-150 ease-in-out">Cancel</a>
        </span>
                                <span class="ml-3 inline-flex rounded-md shadow-sm">
                    <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent text-sm leading-5 font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:border-indigo-700 focus:shadow-outline-indigo active:bg-indigo-700 transition duration-150 ease-in-out">Save</button>
                </span>
                            </div>
                        </div>


                    </form>


                </div>



                <div th:replace="~{fragments/notifications :: notifications}"></div>

            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
